<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ifeanyi Nnamani Emmanuel | Smork♿💫</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
  font-family: 'Inter', sans-serif;
  background:#0f172a;
  color:white;
  transition:0.3s;
}
.light{
  background:#f9fafb;
  color:#111;
}

/* glass */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:1rem;
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 12px 40px rgba(0,0,0,0.35);
  transition:0.3s;
}
.glass:hover{ transform:translateY(-5px); }

/* toast */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1e40af;
  padding:12px 20px;
  border-radius:8px;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}
.toast.show{ opacity:1; transform:translateY(0); }

img{ cursor:pointer; }
</style>
</head>

<body>

<!-- THEME TOGGLE -->
<button onclick="toggleTheme()" class="fixed top-4 right-4 glass px-4 py-2">
<i class="fas fa-moon"></i>
</button>

<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center px-6">

<img id="heroImg" src="assets/hero.jpg"
class="w-36 h-36 rounded-full mb-4 border-2 border-blue-600 shadow-xl"
onclick="openHero()">

<h1 class="text-4xl md:text-6xl font-extrabold">Ifeanyi Nnamani Emmanuel</h1>

<p class="text-2xl text-blue-400 font-bold mt-2">Smork♿💫</p>

<p class="text-lg mt-3 text-gray-400">Software Engineer / Frontend Developer</p>

<div class="flex gap-4 mt-6">
<a href="#projects" class="glass px-6 py-3">VIEW WORK</a>
<a href="#contact" class="glass px-6 py-3">CONTACT</a>
</div>

</section>

<!-- HERO MODAL -->
<div id="heroModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex justify-center items-center">
<span onclick="closeHero()" class="absolute top-4 right-6 text-3xl cursor-pointer">✖</span>
<img id="heroFull" class="max-h-full max-w-full rounded">
</div>

<!-- ABOUT -->
<section class="py-20 text-center px-6 max-w-3xl mx-auto">
<h2 class="text-3xl font-bold text-blue-400 mb-6">About</h2>
<p class="text-gray-400">
I build modern, responsive, high-end web apps with smooth UI/UX and clean performance.
</p>
</section>

<!-- PROJECTS -->
<section id="projects" class="py-20 px-6 max-w-6xl mx-auto">
<div class="flex justify-between mb-6">
<h2 class="text-3xl font-bold text-blue-400">Projects</h2>
</div>

<div id="projectsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-20 text-center">
<h2 class="text-3xl font-bold text-blue-400 mb-6">Contact</h2>

<div class="flex justify-center gap-6 text-2xl flex-wrap">
<a href="https://instagram.com/smork_frmdaeast"><i class="fab fa-instagram"></i></a>
<a href="https://facebook.com/share/1DhHJPTRXL/"><i class="fab fa-facebook"></i></a>
<a href="https://linkedin.com/in/smorkfrmdaeast"><i class="fab fa-linkedin"></i></a>
<a href="https://github.com/Smorkfrmdaeast"><i class="fab fa-github"></i></a>
<a href="mailto:ifeanyinuels32@gmail.com"><i class="fas fa-envelope"></i></a>
<a href="https://wa.me/2349019071679"><i class="fab fa-whatsapp"></i></a>
</div>
</section>

<!-- PROJECT MODAL -->
<div id="detailsModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center">
<div class="glass p-6 max-w-lg w-full relative">

<button onclick="closeDetails()" class="absolute top-3 right-4">✖</button>

<img id="dImg" class="w-full h-48 object-cover rounded mb-4">

<h3 id="dTitle" class="text-xl font-bold text-blue-400"></h3>

<p id="dDesc" class="mt-2 text-gray-300"></p>

<p id="dTech" class="mt-2 text-blue-300"></p>

<div class="flex gap-3 mt-4">
<a id="dLive" target="_blank" class="glass px-3 py-1">Live</a>
<a id="dGit" target="_blank" class="glass px-3 py-1">GitHub</a>
</div>

</div>
</div>

<div id="toast" class="toast">Done</div>

<script>

/* IMAGES */
const images = [
"assets/smork-ecommerce-app.jpg",
"assets/smork-tech-calculator.jpg",
"assets/smorks-paydom-platform.jpg",
"assets/unique-homes-landing-page.jpg",
"assets/smart-appointment-booking.jpg"
];

/* PROJECT DATA */
const projects = [
{
title:"FINTECH DASHBOARD",
tech:"HTML, Tailwind CSS, JavaScript",
live:"https://smorkfrmdaeast.github.io/fintech-dashboard/login.html",
github:"https://github.com/Smorkfrmdaeast/fintech-dashboard",
description:"Modern fintech dashboard UI"
},
{
title:"APPOINTMENT PLATFORM",
tech:"HTML, CSS, JavaScript",
live:"https://smorkfrmdaeast.github.io/appointment-booking-platform/",
github:"https://github.com/Smorkfrmdaeast/appointment-booking-platform",
description:"Smart booking system"
},
{
title:"E-COMMERCE STORE",
tech:"HTML, CSS, JavaScript",
live:"https://smorkfrmdaeast.github.io/smork-ecommerce-store/",
github:"https://github.com/Smorkfrmdaeast/smork-ecommerce-store",
description:"Online store UI"
},
{
title:"UNIQUE HOMES",
tech:"HTML, Tailwind CSS",
live:"https://smorkfrmdaeast.github.io/unique-homes-website/",
github:"https://github.com/Smorkfrmdaeast/unique-homes-website",
description:"Perfume landing page"
},
{
title:"TECH CALCULATOR",
tech:"HTML, CSS, JavaScript",
live:"https://smorkfrmdaeast.github.io/smorks-tech-calculator/",
github:"https://github.com/Smorkfrmdaeast/smorks-tech-calculator",
description:"Functional calculator"
}
];

/* RENDER */
const container = document.getElementById("projectsContainer");

function render(){
container.innerHTML = projects.map((p,i)=>`
<div class="glass p-4" onclick="openDetails(${i})">
<img src="${images[i]}" class="h-40 w-full object-cover rounded mb-2">
<h3 class="text-lg font-bold text-blue-400">${p.title}</h3>
<p>${p.description}</p>
</div>
`).join("");
}
render();

/* DETAILS */
function openDetails(i){
document.getElementById("dImg").src = images[i];
document.getElementById("dTitle").textContent = projects[i].title;
document.getElementById("dDesc").textContent = projects[i].description;
document.getElementById("dTech").textContent = "Tech: " + projects[i].tech;
document.getElementById("dLive").href = projects[i].live;
document.getElementById("dGit").href = projects[i].github;

document.getElementById("detailsModal").classList.remove("hidden");
}

function closeDetails(){
document.getElementById("detailsModal").classList.add("hidden");
}

/* HERO MODAL */
function openHero(){
document.getElementById("heroFull").src = document.getElementById("heroImg").src;
document.getElementById("heroModal").classList.remove("hidden");
}

function closeHero(){
document.getElementById("heroModal").classList.add("hidden");
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* TOAST */
function toast(msg){
let t = document.getElementById("toast");
t.textContent = msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

</script>

</body>
      </html>
